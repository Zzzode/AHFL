name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 3

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install --yes clang-format ninja-build

      - name: Configure
        run: cmake --preset dev

      - name: Check formatting
        run: cmake --build --preset build-format-check

  build-and-test:
    name: Build And Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes ninja-build

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: command -v ninja >/dev/null || brew install ninja

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          c++ --version

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset build-dev

      - name: Run V0.3 Project Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.3-(project-model|project-debug|semantics|compat)'

      - name: Run V0.3 IR Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.3-ir'

      - name: Run V0.3 Backend Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.3-backend'

      - name: Run V0.4 Package Model Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.4-package-model'

      - name: Run V0.4 Package Emission Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.4-package-emission'

      - name: Run V0.4 Package Compatibility Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.4-package-compat'

      - name: Run V0.5 Package Authoring Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.5-package-authoring-(model|emission|validation)'

      - name: Run V0.5 Package Review Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.5-package-review'

      - name: Run V0.5 Reference Consumer Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.5-reference-consumer'

      - name: Run V0.6 Execution Plan And Dry-Run Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.6-(execution-plan-model|execution-plan-emission|execution-plan-validation|dry-run-model|dry-run-mock-input|dry-run-trace)'

      - name: Run V0.7 Runtime Session And Execution Journal Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.7-(runtime-session-model|runtime-session-validation|runtime-session-emission|execution-journal-model|execution-journal-bootstrap|execution-journal-emission)'

      - name: Run V0.8 Replay And Audit Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.8-(replay-view-model|replay-view-validation|replay-view-emission|audit-report-model|audit-report-bootstrap|audit-report-emission)'

      - name: Run V0.9 Failure-Path Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.9-(runtime-session-validation|runtime-session-bootstrap|runtime-session-emission|execution-journal-model|execution-journal-bootstrap|replay-view-model|replay-view-emission|audit-report-bootstrap|audit-report-emission)'

      - name: Run V0.10 Scheduler Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.10-scheduler-regression'

      - name: Run V0.11 Checkpoint Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.11'

      - name: Run V0.12 Persistence Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.12'

      - name: Run V0.13 Export Package Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.13'

      - name: Run V0.14 Store Import Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.14'

      - name: Run V0.15 Durable Store Import Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.15'

      - name: Run V0.16 Durable Adapter Decision Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.16'

      - name: Run V0.17 Durable Adapter Receipt Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.17'

      - name: Run V0.18 Durable Adapter Receipt Persistence Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.18'

      - name: Run V0.19 Durable Adapter Receipt Persistence Response Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.19'

      - name: Run V0.20 Durable Adapter Execution Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.20'

      - name: Run V0.21 Durable Provider Adapter Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.21'

      - name: Run V0.22 Durable Provider Driver Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.22'

      - name: Run V0.23 Durable Provider Runtime Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.23'

      - name: Run V0.24 Durable Provider SDK Envelope Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.24'

      - name: Run V0.25 Durable Provider Host Execution Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.25'

      - name: Run V0.26 Durable Provider Local Host Execution Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.26'

      - name: Run V0.27 Durable Provider SDK Adapter Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.27'

      - name: Run V0.28 Durable Provider SDK Adapter Interface Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.28'

      - name: Run V0.29 Durable Provider Config Loader Prototype Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.29'

      - name: Run V0.30-V0.33 Durable Provider Boundary Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.(30|31|32|33)'

      - name: Run V0.34-V0.36 Durable Provider Alpha Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.(34|35|36)'

      - name: Run V0.37-V0.39 Durable Provider Recovery Audit Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.(37|38|39)'

      - name: Run V0.40-V0.42 Durable Provider Readiness Regression
        run: ctest --preset test-dev --output-on-failure -L 'ahfl-v0.(40|41|42)'

      - name: Run Full Tests
        run: ctest --preset test-dev --output-on-failure

  asan-linux:
    name: ASan UBSan (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install --yes ninja-build

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          c++ --version

      - name: Configure
        run: cmake --preset asan

      - name: Build
        run: cmake --build --preset build-asan

      - name: Run V0.10 Scheduler Prototype Regression
        run: ctest --preset test-asan --output-on-failure -L 'v0.10-scheduler-regression'

      - name: Run V0.11 Checkpoint Prototype Regression
