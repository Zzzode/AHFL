name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 3

jobs:
  rfc-check:
    name: RFC Check
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check RFC registry
        run: python3 scripts/check-rfc.py

  format-check:
    name: Format Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update && sudo apt-get install --yes ninja-build pipx
          pipx install clang-format==18.1.8
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify clang-format version
        run: clang-format --version

      - name: Configure
        run: cmake --preset dev -DCLANG_FORMAT_BIN=$(which clang-format)

      - name: Check formatting
        run: cmake --build --preset build-format-check

      # .ahfl formatter gate (M3-2). Runs ahflc fmt --check over the formatter
      # golden fixtures. Currently continue-on-error because the formatter is
      # non-idempotent / destructive on generics (corelib-support-workplan §3.5
      # #8) — it reports drift without blocking CI. Drop continue-on-error and
      # widen GATE_DIRS to std/ once the formatter is realigned to the grammar.
      - name: Build ahflc (for fmt --check)
        run: cmake --build --preset build-dev --target ahflc
      - name: Check .ahfl formatting
        continue-on-error: true
        run: AHFLC=build/dev/src/tooling/cli/ahflc scripts/ci-format-check.sh

  build-and-test:
    name: Build And Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes ninja-build

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: command -v ninja >/dev/null || brew install ninja

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          c++ --version

      - name: Configure
        run: cmake --preset dev -DAHFL_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build --preset build-dev

      - name: Run test suite
        run: ctest --preset test-dev --output-on-failure --no-label-summary

  asan-linux:
    name: ASan UBSan (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install --yes ninja-build

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          c++ --version

      - name: Configure
        run: cmake --preset asan -DAHFL_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build --preset build-asan

      - name: Run sanitizer test suite
        run: ctest --preset test-asan --output-on-failure --no-label-summary
