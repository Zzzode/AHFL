name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 3

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install --yes clang-format ninja-build

      - name: Configure
        run: cmake --preset dev

      - name: Check formatting
        run: cmake --build --preset build-format-check

  build-and-test:
    name: Build And Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes ninja-build

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: command -v ninja >/dev/null || brew install ninja

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          c++ --version

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset build-dev

      - name: Run V0.3 Project Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.3-(project-model|project-debug|semantics|compat)'

      - name: Run V0.3 IR Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.3-ir'

      - name: Run V0.3 Backend Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.3-backend'

      - name: Run V0.4 Package Model Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.4-package-model'

      - name: Run V0.4 Package Emission Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.4-package-emission'

      - name: Run V0.4 Package Compatibility Regression
        run: ctest --preset test-dev --output-on-failure -L 'v0.4-package-compat'

      - name: Run Full Tests
        run: ctest --preset test-dev --output-on-failure

  asan-linux:
    name: ASan UBSan (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install --yes ninja-build

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          c++ --version

      - name: Configure
        run: cmake --preset asan

      - name: Build
        run: cmake --build --preset build-asan

      - name: Run Tests
        run: ctest --preset test-asan --output-on-failure
