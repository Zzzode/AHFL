manifest_version = 1

[package]
name = "workflow-value-flow"
version = "0.1.0"
edition = "2026"
kind = "application"

[module]
prefix = "ir"
root = "."

[exports]
modules = ["workflow_value_flow"]

[targets.workflow]
kind = "handoff"
entry = "ir::workflow_value_flow::ValueFlowWorkflow"
exports = [
  { kind = "workflow", name = "ir::workflow_value_flow::ValueFlowWorkflow" },
  { kind = "agent", name = "ir::workflow_value_flow::EchoAgent" },
]

[dependencies]
std = { source = "sysroot" }
