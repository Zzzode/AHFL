manifest_version = 1

[package]
name = "workflow-value-flow"
version = "0.2.0"
edition = "2026"
kind = "application"

[module]
prefix = "app"
root = "."

[exports]
modules = ["main"]

[targets.agent-entry]
kind = "handoff"
entry = "lib::agents::AliasAgent"
exports = [
  { kind = "agent", name = "lib::agents::AliasAgent" },
]

[[targets.agent-entry.capability_bindings]]
capability = "lib::agents::Echo"
binding_key = "runtime.echo"

[targets.bad-capability]
kind = "handoff"
entry = "app::main::ValueFlowWorkflow"
exports = [
  { kind = "workflow", name = "app::main::ValueFlowWorkflow" },
]

[[targets.bad-capability.capability_bindings]]
capability = "MissingCapability"
binding_key = "runtime.missing"

[targets.workflow]
kind = "handoff"
entry = "app::main::ValueFlowWorkflow"
exports = [
  { kind = "workflow", name = "app::main::ValueFlowWorkflow" },
  { kind = "agent", name = "lib::agents::AliasAgent" },
]

[[targets.workflow.capability_bindings]]
capability = "lib::agents::Echo"
binding_key = "runtime.echo"

[dependencies]
std = { source = "sysroot" }
workflow-value-flow-lib = { source = "path", path = "../lib", version = "0.2.0" }
